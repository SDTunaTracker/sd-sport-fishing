name: Daily Scrape

on:
  schedule:
    # Every hour, all 24 hours.  At 14:00 UTC (7am Pacific) run the full daily
    # pipeline (SST, weather, Reddit, backtest).  All other hours run the fast
    # hourly-only scrape so we don't hammer NOAA/weather APIs 24x per day.
    - cron: '0 * * * *'
  workflow_dispatch:  # allow manual triggering from the Actions tab

permissions:
  contents: write  # required so the workflow can commit back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrape
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "14" ]; then
            echo "=== Full daily run (SST, weather, Reddit, backtest) ==="
            python -m src.main
          else
            echo "=== Hourly scrape (fast) ==="
            python -m src.main --hourly
          fi

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.db web/data.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
