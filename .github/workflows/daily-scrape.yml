name: Daily Scrape

on:
  schedule:
    # 13:00 UTC = 6:00 AM Pacific (PST). During PDT (DST), this runs at 6:00 AM PDT.
    # Actually: 13:00 UTC = 5:00 AM PST / 6:00 AM PDT. See note below.
    - cron: '0 13 * * *'
  workflow_dispatch:  # allow manual triggering from the Actions tab

permissions:
  contents: write  # required so the workflow can commit back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily scrape
        run: python run_daily.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.db web/data.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily scrape: $(date -u +'%Y-%m-%d')"
            git push
          fi
