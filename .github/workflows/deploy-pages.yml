name: Deploy to Pages

on:
  # Run on direct pushes to master (manual commits, PR merges).
  push:
    branches: [master]
  # Run after the Daily Scrape workflow finishes. Required because GitHub's
  # default GITHUB_TOKEN does NOT trigger other workflows via push events
  # (anti-loop safeguard) — so without this, the daily-scrape's auto-commit
  # would never fire a Pages deploy.
  workflow_run:
    workflows: ["Daily Scrape"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

# Required permissions for the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy. Newer pushes wait for in-flight ones to finish
# rather than getting cancelled — keeps the published site consistent.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
