name: Deploy to Pages

on:
  # Run on direct pushes to main (manual commits, PR merges).
  push:
    branches: [main]
  # Run after the Daily Scrape workflow finishes. Required because GitHub's
  # default GITHUB_TOKEN does NOT trigger other workflows via push events
  # (anti-loop safeguard) — so without this, the daily-scrape's auto-commit
  # would never fire a Pages deploy.
  workflow_run:
    workflows: ["Daily Scrape"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Required permissions for the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy. Newer pushes wait for in-flight ones to finish
# rather than getting cancelled — keeps the published site consistent.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Check for global name collisions in JSX files
        run: |
          # Names exported by ui.jsx into window — any other file defining these
          # at the top level (outside an IIFE) would silently clobber them.
          GLOBALS="fmt SPECIES_COLORS TROPHY_SPECIES MONTH_NAMES AppHeader SideNav Crumbs KPI Panel Sparkline VBarChart StackedBarChart LineChart Donut MoonGlyph"
          FAIL=0
          for name in $GLOBALS; do
            # Look for bare top-level declarations: function X, const X =, var X =
            # Exclude ui.jsx itself and any IIFE-wrapped file (admin.jsx).
            hits=$(grep -rn --include="*.jsx" \
              -E "^(function ${name}[( ]|const ${name}\s*=|var ${name}\s*=|let ${name}\s*=)" \
              web/ | grep -v "web/ui.jsx" || true)
            if [ -n "$hits" ]; then
              echo "COLLISION: '$name' redefined outside ui.jsx:"
              echo "$hits"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Pre-compile JSX with esbuild and stamp cache-bust version
        run: |
          set -e
          VERSION=$(date -u +%Y%m%d%H%M)
          echo "Build version: $VERSION"

          # Compile all JSX files → web/dist/*.js
          # --minify-whitespace and --minify-syntax are safe; --minify-identifiers
          # is intentionally excluded because top-level names (AppHeader, ChatBot,
          # etc.) are referenced as globals by other scripts loaded after this one.
          mkdir -p web/dist
          npx --yes esbuild web/*.jsx \
            --outdir=web/dist \
            --loader:.jsx=jsx \
            --jsx-factory=React.createElement \
            --jsx-fragment=React.Fragment \
            --minify-whitespace \
            --minify-syntax \
            --target=es2018
          echo "esbuild done — $(ls web/dist/*.js | wc -l) files in web/dist/"

          # Patch index.html: remove Babel CDN tag, update script refs to dist/
          # Use inline Python (avoids __file__ path-resolution issues on the runner).
          python3 - <<PYEOF
import re
v = "$VERSION"
with open("web/index.html", encoding="utf-8") as fh:
    t = fh.read()
original = t
# 1. Remove @babel/standalone script tag
t = re.sub(r"\n?[ \t]*<script[^>]+babel\.min\.js[^>]*></script>", "", t)
# 2. Replace type="text/babel" JSX refs with compiled dist/ refs
t = re.sub(
    r'type="text/babel" src="([^"]+)\.jsx\?v=[^"]+"',
    lambda m: f'src="dist/{m.group(1)}.js?v={v}"',
    t,
)
# 3. Stamp all remaining ?v= query strings
t = re.sub(r"\?v=[^\"'\s]+", f"?v={v}", t)
with open("web/index.html", "w", encoding="utf-8") as fh:
    fh.write(t)
# Verify the patch actually ran
assert "babel.min.js" not in t, "PATCH FAILED: Babel tag not removed"
assert 'type="text/babel"' not in t, "PATCH FAILED: text/babel still present"
assert f"?v={v}" in t, "PATCH FAILED: version string not stamped"
print(f"index.html patched OK (v={v})")
PYEOF

          echo "--- Script tags in patched index.html ---"
          grep -i "<script" web/index.html

      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
