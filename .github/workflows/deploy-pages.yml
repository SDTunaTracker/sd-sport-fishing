name: Deploy to Pages

on:
  # Run on direct pushes to main (manual commits, PR merges).
  push:
    branches: [main]
  # Run after the Daily Scrape workflow finishes. Required because GitHub's
  # default GITHUB_TOKEN does NOT trigger other workflows via push events
  # (anti-loop safeguard) — so without this, the daily-scrape's auto-commit
  # would never fire a Pages deploy.
  workflow_run:
    workflows: ["Daily Scrape"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Required permissions for the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy. Newer pushes wait for in-flight ones to finish
# rather than getting cancelled — keeps the published site consistent.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Check for global name collisions in JSX files
        run: |
          # Names exported by ui.jsx into window — any other file defining these
          # at the top level (outside an IIFE) would silently clobber them.
          GLOBALS="fmt SPECIES_COLORS TROPHY_SPECIES MONTH_NAMES AppHeader SideNav Crumbs KPI Panel Sparkline VBarChart StackedBarChart LineChart Donut MoonGlyph"
          FAIL=0
          for name in $GLOBALS; do
            # Look for bare top-level declarations: function X, const X =, var X =
            # Exclude ui.jsx itself and any IIFE-wrapped file (admin.jsx).
            hits=$(grep -rn --include="*.jsx" \
              -E "^(function ${name}[( ]|const ${name}\s*=|var ${name}\s*=|let ${name}\s*=)" \
              web/ | grep -v "web/ui.jsx" || true)
            if [ -n "$hits" ]; then
              echo "COLLISION: '$name' redefined outside ui.jsx:"
              echo "$hits"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Stamp cache-bust version into index.html
        run: |
          VERSION=$(date -u +%Y%m%d%H%M)
          sed -i "s/?v=[^\"']*/?v=${VERSION}/g" web/index.html

      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
