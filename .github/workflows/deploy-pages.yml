name: Deploy to Pages

on:
  # Run on direct pushes to main (manual commits, PR merges).
  push:
    branches: [main]
  # Run after the Daily Scrape workflow finishes. Required because GitHub's
  # default GITHUB_TOKEN does NOT trigger other workflows via push events
  # (anti-loop safeguard) — so without this, the daily-scrape's auto-commit
  # would never fire a Pages deploy.
  workflow_run:
    workflows: ["Daily Scrape"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Required permissions for the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy. Newer pushes wait for in-flight ones to finish
# rather than getting cancelled — keeps the published site consistent.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Check for global name collisions in JSX files
        run: |
          # Names exported by ui.jsx into window — any other file defining these
          # at the top level (outside an IIFE) would silently clobber them.
          GLOBALS="fmt SPECIES_COLORS TROPHY_SPECIES MONTH_NAMES AppHeader SideNav Crumbs KPI Panel Sparkline VBarChart StackedBarChart LineChart Donut MoonGlyph"
          FAIL=0
          for name in $GLOBALS; do
            # Look for bare top-level declarations: function X, const X =, var X =
            # Exclude ui.jsx itself and any IIFE-wrapped file (admin.jsx).
            hits=$(grep -rn --include="*.jsx" \
              -E "^(function ${name}[( ]|const ${name}\s*=|var ${name}\s*=|let ${name}\s*=)" \
              web/ | grep -v "web/ui.jsx" || true)
            if [ -n "$hits" ]; then
              echo "COLLISION: '$name' redefined outside ui.jsx:"
              echo "$hits"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Pre-compile JSX with esbuild and stamp cache-bust version
        run: |
          VERSION=$(date -u +%Y%m%d%H%M)
          echo "Build version: $VERSION"

          # Compile all JSX files → web/dist/*.js
          # --minify-whitespace and --minify-syntax are safe; --minify-identifiers
          # is intentionally excluded because top-level names (AppHeader, ChatBot,
          # etc.) are referenced as globals by other scripts loaded after this one.
          mkdir -p web/dist
          npx --yes esbuild web/*.jsx \
            --outdir=web/dist \
            --loader:.jsx=jsx \
            --jsx-factory=React.createElement \
            --jsx-fragment=React.Fragment \
            --minify-whitespace \
            --minify-syntax \
            --target=es2018
          echo "esbuild done: $(ls web/dist/*.js | wc -l) files in web/dist/"

          # Patch index.html: remove Babel CDN tag, update script refs to dist/
          # build-prod.py uses os.path.abspath(__file__) so path resolution is
          # reliable regardless of CWD on the runner.
          python3 scripts/build-prod.py "$VERSION"

          # Bash-level verification — fail loudly if the patch didn't take
          if grep -q 'babel\.min\.js' web/index.html; then
            echo "ERROR: Babel script tag still present after patching" && exit 1
          fi
          if grep -q 'type="text/babel"' web/index.html; then
            echo "ERROR: type=text/babel still present after patching" && exit 1
          fi
          echo "--- Script tags in patched index.html ---"
          grep -i "<script" web/index.html

      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Cloudflare cache
        # Clears Cloudflare's edge cache immediately after deploy so thetunatracker.com
        # serves fresh HTML instead of a stale GitHub Pages Fastly edge response.
        # Requires two repository secrets: CLOUDFLARE_ZONE_ID and CLOUDFLARE_API_TOKEN
        # (token needs Zone → Cache Purge permission only).
        # Skip silently if secrets are not configured yet.
        if: ${{ env.CLOUDFLARE_ZONE_ID != '' }}
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Purging Cloudflare cache for zone $CLOUDFLARE_ZONE_ID..."
          RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESULT"
          echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)"

      - name: Verify Cloudflare Pages build succeeded
        # Polls the CF Pages API until the build for the current commit
        # completes (success or failure). Fails this workflow loudly if CF
        # Pages rejected the build — catches issues like the 25 MiB file-size
        # limit before you discover it hours later on the live site.
        # Requires CLOUDFLARE_API_TOKEN (Cache Purge) and CLOUDFLARE_ACCOUNT_ID.
        # Skips silently if secrets are not yet configured.
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT="sd-sport-fishing"
          SHA=$(git rev-parse HEAD)
          SHORT=${SHA:0:12}
          echo "Waiting for Cloudflare Pages build for commit $SHORT..."
          sleep 20
          for i in $(seq 1 30); do
            RESP=$(curl -s \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/deployments" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
            STATUS=$(echo "$RESP" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for d in data.get('result', []):
              sha = (d.get('deployment_trigger') or {}).get('metadata', {}).get('commit_hash', '')
              if sha.startswith('$SHORT'):
                  stage = d.get('latest_stage', {})
                  print(stage.get('status', 'unknown'))
                  sys.exit(0)
          print('pending')
          " 2>/dev/null || echo "pending")
            echo "  attempt $i/30: $STATUS"
            if [ "$STATUS" = "success" ]; then
              echo "Cloudflare Pages build succeeded."
              exit 0
            fi
            if [ "$STATUS" = "failure" ]; then
              echo "Cloudflare Pages build FAILED for commit $SHORT."
              echo "Check: https://dash.cloudflare.com/pages/project/$PROJECT"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for Cloudflare Pages build — check dashboard manually."
        continue-on-error: true

      - name: Post-deploy smoke test
        run: |
          echo "Waiting 60 s for CDN propagation..."
          sleep 60
          python3 scripts/smoke-test.py --base-url=https://thetunatracker.com
        continue-on-error: true
