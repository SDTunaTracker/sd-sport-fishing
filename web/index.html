<!-- Safety net: if the app fails to mount, surface the error on-screen instead of a blank page.
     Registered before the app scripts so it captures their parse/runtime errors. -->
<script>
(function () {
  var errs = [];
  function record(label, msg, src, line, stack) {
    var loc = src ? ' [' + String(src).split('/').pop() + (line ? ':' + line : '') + ']' : '';
    var st = stack ? '\n' + String(stack).split('\n').slice(0, 8).join('\n') : '';
    errs.push('• ' + label + ': ' + (msg || 'unknown') + loc + st);
  }
  window.addEventListener('error', function (e) {
    record('Error', e.message, e.filename, e.lineno, e.error && e.error.stack);
    showIfBlank();
  });
  window.addEventListener('unhandledrejection', function (e) {
    var r = e.reason;
    record('Promise', r && r.message ? r.message : String(r), null, null, r && r.stack);
    showIfBlank();
  });
  function showIfBlank() {
    var root = document.getElementById('root');
    if (!root || root.childElementCount > 0) return;
    root.innerHTML =
      '<div style="padding:16px;font:13px/1.6 -apple-system,system-ui,monospace;color:#7f1d1d">' +
      '<b style="font-size:15px">The Tuna Tracker hit a load error</b>' +
      '<pre style="white-space:pre-wrap;margin:12px 0">' +
      (errs.length ? errs.join('\n') : '(no JS error captured — likely a resource/memory limit)') +
      '</pre><div style="color:#475569;font-size:11px">' + navigator.userAgent + '</div></div>';
  }
  window.setTimeout(showIfBlank, 4000);
})();
</script>
